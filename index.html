<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Australia Heritage Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100vh;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px 16px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    #sidebar.collapsed {
      transform: translateX(-300px);
    }

    #sidebar h1 {
      font-size: 20px;
      margin-bottom: 4px;
      color: #2c3e50;
    }

    #sidebar .subtitle {
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 16px;
    }

    /* Search */
    #search-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
    }

    #search-input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
    }

    /* Region filters */
    .filter-section {
      margin-bottom: 16px;
    }

    .filter-section h3 {
      font-size: 13px;
      color: #95a5a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .region-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      margin: 0 4px 6px 0;
      border: 2px solid;
      border-radius: 20px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .region-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .region-btn.active {
      color: white !important;
    }

    .region-btn .count {
      font-size: 10px;
      opacity: 0.7;
    }

    /* Museum list */
    .museum-list-section h3 {
      font-size: 13px;
      color: #95a5a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    #museum-count {
      font-size: 12px;
      color: #95a5a6;
      margin-bottom: 8px;
    }

    .museum-item {
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
    }

    .museum-item:hover {
      background: #f8f9fa;
    }

    .museum-item .museum-name {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 2px;
    }

    .museum-item .museum-address {
      font-size: 12px;
      color: #95a5a6;
    }

    .museum-item .museum-region-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .museum-item .museum-region {
      font-size: 11px;
      color: #95a5a6;
    }

    /* Toggle button */
    #toggle-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 1001;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    #sidebar:not(.collapsed) ~ #toggle-btn {
      left: 310px;
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      min-width: 240px;
    }

    .popup-card {
      padding: 16px;
    }

    .popup-card .popup-region {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-bottom: 8px;
    }

    .popup-card h2 {
      font-size: 16px;
      color: #2c3e50;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup-card .popup-address {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }

    .popup-card .popup-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .popup-card .popup-link {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 6px;
      background: #3498db;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .popup-card .popup-link:hover {
      background: #2980b9;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        width: 260px;
      }

      #sidebar:not(.collapsed) ~ #toggle-btn {
        left: 270px;
      }
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <div id="sidebar">
    <h1>Australia Heritage</h1>
    <p class="subtitle">澳大利亚历史建筑与博物馆地图</p>

    <input type="text" id="search-input" placeholder="Search museums & historic places..." />

    <div class="filter-section">
      <h3>Regions</h3>
      <div id="region-filters"></div>
    </div>

    <div class="museum-list-section">
      <h3>Museums</h3>
      <div id="museum-count"></div>
      <div id="museum-list"></div>
    </div>
  </div>

  <button id="toggle-btn" title="Toggle sidebar">&#9776;</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
const museums = [
  // ===== Victoria (VIC) =====
  {name:"Old Treasury Building",lat:-37.8129,lng:144.9722,address:"20 Spring Street, East Melbourne VIC 3002",description:"展示墨尔本淘金热时期历史，包括建筑本身的地下金库。",link:"https://www.oldtreasurybuilding.org.au/",region:"VIC"},
  {name:"Sovereign Hill",lat:-37.5736,lng:143.8563,address:"Bradshaw Street, Ballarat VIC 3350",description:"澳大利亚最著名的户外博物馆，重现1850年代淘金热时期的Ballarat。",link:"https://sovereignhill.com.au/",region:"VIC"},
  {name:"Eureka Centre",lat:-37.5634,lng:143.8621,address:"102 Stawell Street South, Ballarat East VIC 3350",description:"纪念1854年Eureka起义，展示澳大利亚民主发展史。",link:"https://www.ballarat.vic.gov.au/",region:"VIC"},
  {name:"Golden Dragon Museum",lat:-36.7588,lng:144.2801,address:"1-11 Bridge Street, Bendigo VIC 3550",description:"展示Bendigo华人社区历史，包括世界最古老的帝国龙Loong。",link:"https://goldendragonmuseum.org/",region:"VIC"},
  {name:"Bendigo Tramways",lat:-36.7620,lng:144.2786,address:"1 Tramways Way, Bendigo VIC 3550",description:"澳大利亚最古老的运营有轨电车系统之一。",link:"https://bendigotramways.com/",region:"VIC"},
  {name:"National Wool Museum",lat:-38.1450,lng:144.3568,address:"105 Brougham Street, Geelong VIC 3220",description:"澳大利亚唯一的羊毛博物馆。",link:"https://www.geelongaustralia.com.au/nwm/",region:"VIC"},
  {name:"Flagstaff Hill Maritime Village",lat:-38.3833,lng:142.4868,address:"89 Merri Street, Warrnambool VIC 3280",description:"户外海事博物馆，展示沉船历史和早期港口生活。",link:"https://flagstaffhill.com.au/",region:"VIC"},
  {name:"Beechworth Historic Precinct",lat:-36.3589,lng:146.6859,address:"Beechworth VIC 3747",description:"维多利亚州保存最完好的淘金热城镇之一，包括Ned Kelly受审的法院。",link:"https://www.beechworthonline.com.au/",region:"VIC"},
  {name:"Swan Hill Pioneer Settlement",lat:-35.3478,lng:143.5583,address:"Monash Drive, Swan Hill VIC 3585",description:"澳大利亚最重要的户外博物馆之一，展示墨累河地区的历史。",link:"https://pioneersettlement.com.au/",region:"VIC"},
  {name:"Como House & Garden",lat:-37.8398,lng:145.0127,address:"Corner Williams Road & Lechlade Avenue, South Yarra VIC 3141",description:"建于1847年的殖民时期豪宅，融合澳大利亚摄政式和意大利风格建筑，拥有精美花园和室内陈设。",link:"https://www.nationaltrust.org.au/places/como-house/",region:"VIC"},
  {name:"Rippon Lea Estate",lat:-37.8878,lng:145.0018,address:"192 Hotham Street, Elsternwick VIC 3185",description:"1868年建造的维多利亚时期宏伟庄园，占地14英亩，拥有华丽宅邸、湖泊、蕨类温室和花园。",link:"https://www.nationaltrust.org.au/places/rippon-lea-estate/",region:"VIC"},
  {name:"Labassa",lat:-37.8731,lng:145.0198,address:"2 Manor Grove, Caulfield North VIC 3161",description:"1890年代华丽的维多利亚豪宅，以精美的彩色玻璃窗、手绘天花板和精致的石膏装饰闻名。",link:"https://www.nationaltrust.org.au/places/labassa/",region:"VIC"},
  {name:"Werribee Mansion",lat:-37.8975,lng:144.6827,address:"K Road, Werribee VIC 3030",description:"1870年代意大利风格豪宅，由牧场大亨Chirnside家族建造，坐落于Werribee公园花园和州立玫瑰园之中。",link:"https://www.parks.vic.gov.au/places-to-see/parks/werribee-park/things-to-do/werribee-park-mansion",region:"VIC"},
  {name:"Captain Cook's Cottage",lat:-37.8142,lng:144.9836,address:"Fitzroy Gardens, Wellington Parade, East Melbourne VIC 3002",description:"库克船长父母于1755年在英国约克郡建造的故居，1934年拆卸后运至墨尔本重建于费兹罗花园中。",link:"https://www.melbourne.vic.gov.au/community/hubs-bookable-spaces/Pages/Captain-Cooks-Cottage.aspx",region:"VIC"},
  {name:"La Trobe's Cottage",lat:-37.8396,lng:144.9730,address:"Dallas Brooks Drive, Melbourne VIC 3004",description:"维多利亚州首任副总督Charles La Trobe的故居，1839年建造，是墨尔本最古老的建筑之一。",link:"https://www.nationaltrust.org.au/places/la-trobes-cottage/",region:"VIC"},
  {name:"Barwon Park Mansion",lat:-38.0023,lng:144.0177,address:"105 Inverleigh Road, Winchelsea VIC 3240",description:"1869至1871年建造的42间房青石豪宅，由牧场主Thomas Austin夫妇建造，气势恢宏。",link:"https://www.nationaltrust.org.au/places/barwon-park/",region:"VIC"},
  {name:"Gulf Station",lat:-37.6880,lng:145.4430,address:"1029 Melba Highway, Yarra Glen VIC 3775",description:"维多利亚州保存最完整的早期先驱农场之一，展示1850年代至1940年代的乡村农业生活。",link:"https://www.nationaltrust.org.au/places/gulf-station/",region:"VIC"},
  {name:"McCrae Homestead",lat:-38.3528,lng:144.9205,address:"11 Beverley Road, McCrae VIC 3938",description:"1844年建造的石灰岩住宅，是维多利亚州现存最古老的宅基地之一，采用独特的苏格兰风格设计。",link:"https://www.nationaltrust.org.au/places/mccrae-homestead/",region:"VIC"},
  {name:"Mooramong",lat:-37.6860,lng:143.3390,address:"Skipton-Lismore Road, Skipton VIC 3360",description:"1930年代装饰艺术风格改造的历史宅基地，由好莱坞电影制片人Claude McKenzie与其妻子Doris增添了独特的时代魅力。",link:"https://www.nationaltrust.org.au/places/mooramong/",region:"VIC"},
  {name:"Barwon Grange",lat:-38.1460,lng:144.3540,address:"71-73 Fernleigh Street, Newtown VIC 3220",description:"1850年代意大利风格河畔住宅，是Geelong地区唯一幸存的早期河滨别墅。",link:"https://www.nationaltrust.org.au/places/barwon-grange/",region:"VIC"},
  {name:"The Heights",lat:-38.1380,lng:144.3480,address:"140 Aphrasia Street, Newtown VIC 3220",description:"Geelong地区淘金热之前保存最完好的住宅，维多利亚州最大的预制铁房屋，建于1850年代。",link:"https://www.nationaltrust.org.au/places/the-heights-geelong/",region:"VIC"},
  {name:"Portable Iron Houses",lat:-37.8385,lng:144.9577,address:"399 Coventry Street, South Melbourne VIC 3205",description:"三栋1850年代淘金热时期从英国运来的预制铁屋，是极早期预制建筑的罕见实物例证。",link:"https://www.nationaltrust.org.au/places/portable-iron-houses/",region:"VIC"},
  {name:"Rupertswood Mansion",lat:-37.5740,lng:144.7260,address:"Rupertswood Boulevard, Sunbury VIC 3429",description:"1870年代意大利风格豪宅，因与板球'灰烬杯'(The Ashes)起源故事密切相关而闻名于世。",link:"https://www.salesian.vic.edu.au/rupertswood-mansion/",region:"VIC"},
  {name:"Mont De Lancey Heritage Homestead",lat:-37.7870,lng:145.4310,address:"71 Wellington Street, Wandin North VIC 3139",description:"1880年代先驱者宅基地，展示Yarra Valley地区早期定居者的乡村生活和手工艺。",link:"https://montdelancey.org.au/",region:"VIC"},
  {name:"Government House Melbourne",lat:-37.8413,lng:144.9756,address:"Government House Drive, Melbourne VIC 3004",description:"建于1876年的意大利风格建筑，是维多利亚州总督官邸，也是澳大利亚最宏伟的政府建筑之一。",link:"https://www.governor.vic.gov.au/government-house/visit-government-house",region:"VIC"},
  {name:"Tasma Terrace (National Trust HQ)",lat:-37.8143,lng:144.9666,address:"267 Collins Street, Melbourne VIC 3000",description:"1878年建造的维多利亚时期排屋群，是墨尔本市中心仅存的此类建筑，现为澳大利亚国家信托(维州)总部。",link:"https://www.nationaltrust.org.au/places/tasma-terrace/",region:"VIC"},
  {name:"Kyneton Museum",lat:-37.2443,lng:144.4472,address:"67 Piper Street, Kyneton VIC 3444",description:"收藏于1856年建造的前新南威尔士银行分行建筑中。包括银行经理住宅、青石马厩、马车和历史农业设备收藏。",link:"https://www.mrsc.vic.gov.au/See-Do/Arts-Culture/Kyneton-Museum",region:"VIC"},

  // ===== New South Wales (NSW) - Historic Houses, Mansions & Estates =====
  {name:"Vaucluse House",lat:-33.8606,lng:151.2787,address:"Wentworth Road, Vaucluse NSW 2030",description:"19世纪殖民时期庄园，为政治家William Charles Wentworth的故居，拥有宏伟的建筑和历史花园。由Museums of History NSW管理。",link:"https://museums.history.nsw.gov.au/venue/vaucluse-house/",region:"NSW"},
  {name:"Elizabeth Bay House",lat:-33.8742,lng:151.2256,address:"7 Onslow Avenue, Elizabeth Bay NSW 2011",description:"1835-1839年建造的摄政时期风格豪宅，被誉为澳大利亚殖民地建筑的最佳典范之一，拥有壮观的椭圆形大厅。",link:"https://museums.history.nsw.gov.au/venue/elizabeth-bay-house/",region:"NSW"},
  {name:"Old Government House",lat:-33.8148,lng:151.0033,address:"Parramatta Park, Pitt Street, Parramatta NSW 2150",description:"澳大利亚最古老的公共建筑，曾为早期新南威尔士州总督的官邸，位于世界遗产名录的Parramatta公园内。",link:"https://www.nationaltrust.org.au/places/old-government-house/",region:"NSW"},
  {name:"Elizabeth Farm",lat:-33.8161,lng:151.0049,address:"70 Alice Street, Rosehill NSW 2142",description:"建于1793年，是澳大利亚现存最古老的欧洲人建筑，为羊毛工业先驱John Macarthur的故居。",link:"https://museums.history.nsw.gov.au/venue/elizabeth-farm/",region:"NSW"},
  {name:"Hyde Park Barracks",lat:-33.8687,lng:151.2132,address:"Queens Square, Macquarie Street, Sydney NSW 2000",description:"联合国世界文化遗产，由流放建筑师Francis Greenway设计，展示澳大利亚殖民历史和囚犯生活。",link:"https://museums.history.nsw.gov.au/venue/hyde-park-barracks/",region:"NSW"},
  {name:"Susannah Place Museum",lat:-33.8572,lng:151.2053,address:"58-64 Gloucester Street, The Rocks NSW 2000",description:"建于1844年的四栋工人阶级排屋，原汁原味地保留了150年的居住历史和悉尼工人阶级的日常生活。",link:"https://museums.history.nsw.gov.au/venue/susannah-place-museum/",region:"NSW"},
  {name:"Meroogal",lat:-34.8770,lng:150.5950,address:"78 West Street, Nowra NSW 2541",description:"建于1880年代的百年老宅，由四代女性家族成员传承保存，完整展示了从维多利亚到现代的乡村家居生活。",link:"https://museums.history.nsw.gov.au/venue/meroogal/",region:"NSW"},
  {name:"Rouse Hill House & Farm",lat:-33.6803,lng:150.9062,address:"356 Annangrove Road, Rouse Hill NSW 2155",description:"跨越200年历史的家族庄园，完好保留了从殖民时期到现代的家居陈设和农场建筑。",link:"https://museums.history.nsw.gov.au/venue/rouse-hill-house-farm/",region:"NSW"},
  {name:"Experiment Farm Cottage",lat:-33.8153,lng:151.0030,address:"9 Ruse Street, Harris Park NSW 2150",description:"位于澳大利亚第一个土地授予地块上的历史小屋，展示早期殖民定居者的农耕生活。由澳大利亚国家信托管理。",link:"https://www.nationaltrust.org.au/places/experiment-farm-cottage/",region:"NSW"},
  {name:"Everglades House & Gardens",lat:-33.7132,lng:150.3317,address:"37 Everglades Avenue, Leura NSW 2780",description:"蓝山上1930年代装饰艺术风格的宅邸，由丹麦景观设计师Paul Sorensen设计的壮丽梯田花园。",link:"https://www.nationaltrust.org.au/places/everglades-house-gardens/",region:"NSW"},
  {name:"Retford Park",lat:-34.4765,lng:150.4170,address:"55 ABC Lane, Bowral NSW 2576",description:"南高地维多利亚意大利式风格庄园，由Fairfax家族捐赠给国家信托，拥有精美花园和历史家具。",link:"https://www.nationaltrust.org.au/places/retford-park/",region:"NSW"},
  {name:"Saumarez Homestead",lat:-30.5040,lng:151.6280,address:"230 Saumarez Road, Armidale NSW 2350",description:"新英格兰高地30间房的爱德华时期庄园豪宅（1888-1906年建），展示澳大利亚内陆牧羊业百年历史。",link:"https://www.nationaltrust.org.au/places/saumarez-homestead/",region:"NSW"},
  {name:"Norman Lindsay Gallery & Museum",lat:-33.7109,lng:150.4658,address:"14 Norman Lindsay Crescent, Faulconbridge NSW 2776",description:"澳大利亚著名艺术家Norman Lindsay的故居和工作室，展示其画作、雕塑和文学作品。",link:"https://www.normanlindsay.com.au/",region:"NSW"},
  {name:"Miss Porter's House",lat:-32.9273,lng:151.7767,address:"55 King Street, Newcastle West NSW 2302",description:"建于1909年的爱德华时期排屋，由Porter家族三代女性保存，展示20世纪纽卡斯尔的家居生活。",link:"https://www.nationaltrust.org.au/places/miss-porters-house/",region:"NSW"},
  {name:"Rose Seidler House",lat:-33.7465,lng:151.1175,address:"71 Clissold Avenue, Wahroonga NSW 2076",description:"1948-1950年由著名建筑师Harry Seidler为其父母设计的现代主义住宅，是澳大利亚现代建筑的里程碑。",link:"https://museums.history.nsw.gov.au/venue/rose-seidler-house/",region:"NSW"},
  {name:"Government House Sydney",lat:-33.8562,lng:151.2150,address:"Macquarie Street, Sydney NSW 2000",description:"新南威尔士州总督官邸，建于1845年的哥特复兴式建筑，提供导览参观，展示州级历史收藏。",link:"https://www.governmenthouse.nsw.gov.au/",region:"NSW"},

  {name:"Government House Canberra (Yarralumla)",lat:-35.3090,lng:149.0940,address:"Dunrossil Drive, Yarralumla ACT 2600",description:"澳大利亚总督官邸，建于1890年代，每年特定开放日和遗产节期间向公众开放参观房间和花园。",link:"https://www.gg.gov.au/",region:"ACT"},
  {name:"The Lodge",lat:-35.3150,lng:149.1000,address:"5 Adelaide Avenue, Deakin ACT 2600",description:"澳大利亚总理官邸，1927年建造，偶尔在特定开放日向公众开放参观。",link:"https://www.pmc.gov.au/",region:"ACT"},
  {name:"St John the Baptist Church",lat:-35.2830,lng:149.1350,address:"43 Constitution Avenue, Reid ACT 2612",description:"1845年建造的堪培拉最古老教堂，哥特复兴风格砂岩建筑，内部保存殖民时期碑铭和Campbell家族纪念碑。",link:"https://www.stjohnscanberra.org/",region:"ACT"},
  {name:"Old Parliament House Gardens",lat:-35.3015,lng:149.1280,address:"King George Terrace, Parkes ACT 2600",description:"1920-1930年代为议员建造的遗产花园，拥有5000多株玫瑰和宏伟橡树，2004年修复后免费向公众开放。",link:"https://www.nca.gov.au/",region:"ACT"},
  {name:"Yarralumla Play Station / Westbourne House",lat:-35.3100,lng:149.0900,address:"3 Bentham Street, Yarralumla ACT 2600",description:"堪培拉最古老的建筑之一Westbourne House所在，现为社区活动和遗产展示场所。",link:"https://www.yarralumlaplaystation.com.au/",region:"ACT"}
];

const regions = [
  { name: "VIC", color: "#16a085", fullName: "Victoria" },
  { name: "NSW", color: "#2980b9", fullName: "New South Wales" },
  { name: "QLD", color: "#e74c3c", fullName: "Queensland" },
  { name: "SA", color: "#e67e22", fullName: "South Australia" },
  { name: "WA", color: "#8e44ad", fullName: "Western Australia" },
  { name: "TAS", color: "#27ae60", fullName: "Tasmania" },
  { name: "NT", color: "#d35400", fullName: "Northern Territory" },
  { name: "ACT", color: "#2c3e50", fullName: "Australian Capital Territory" }
];

  </script>
  <script>
    // --- Map setup ---
    const map = L.map('map', {
      center: [-28.0, 134.0],
      zoom: 5,
      zoomControl: false
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    // --- Region color & fullName lookup ---
    const regionColorMap = {};
    const regionFullNameMap = {};
    regions.forEach(r => {
      regionColorMap[r.name] = r.color;
      regionFullNameMap[r.name] = r.fullName || r.name;
    });

    function getColor(region) {
      return regionColorMap[region] || '#999';
    }

    // --- Markers ---
    const markersLayer = L.layerGroup().addTo(map);
    let allMarkers = [];

    function createCircleMarker(m) {
      const color = getColor(m.region);
      const marker = L.circleMarker([m.lat, m.lng], {
        radius: 7,
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85
      });

      marker.bindPopup(`
        <div class="popup-card">
          <span class="popup-region" style="background:${color}">${regionFullNameMap[m.region] || m.region}</span>
          <h2>${m.name}</h2>
          <div class="popup-address">${m.address}</div>
          <div class="popup-desc">${m.description}</div>
          <a class="popup-link" href="${m.link}" target="_blank" rel="noopener">Visit Website</a>
        </div>
      `, { maxWidth: 300 });

      marker.museumData = m;
      return marker;
    }

    museums.forEach(m => {
      const marker = createCircleMarker(m);
      markersLayer.addLayer(marker);
      allMarkers.push(marker);
    });

    // --- Region filter buttons ---
    const activeRegions = new Set(regions.map(r => r.name));
    const filtersDiv = document.getElementById('region-filters');

    // Count museums per region
    const regionCounts = {};
    museums.forEach(m => {
      regionCounts[m.region] = (regionCounts[m.region] || 0) + 1;
    });

    regions.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'region-btn active';
      btn.style.borderColor = r.color;
      btn.style.color = r.color;
      btn.style.backgroundColor = r.color;
      btn.innerHTML = `<span class="dot" style="background:white"></span>${r.fullName || r.name} <span class="count">(${regionCounts[r.name] || 0})</span>`;
      btn.dataset.region = r.name;

      btn.addEventListener('click', () => {
        if (activeRegions.has(r.name)) {
          activeRegions.delete(r.name);
          btn.classList.remove('active');
          btn.style.backgroundColor = 'white';
          btn.querySelector('.dot').style.background = r.color;
        } else {
          activeRegions.add(r.name);
          btn.classList.add('active');
          btn.style.backgroundColor = r.color;
          btn.querySelector('.dot').style.background = 'white';
        }
        applyFilters();
      });

      filtersDiv.appendChild(btn);
    });

    // --- Search ---
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => applyFilters());

    function applyFilters() {
      const query = searchInput.value.toLowerCase().trim();
      let visibleCount = 0;

      allMarkers.forEach(marker => {
        const m = marker.museumData;
        const regionMatch = activeRegions.has(m.region);
        const searchMatch = !query || m.name.toLowerCase().includes(query) || m.address.toLowerCase().includes(query);
        const visible = regionMatch && searchMatch;

        if (visible) {
          markersLayer.addLayer(marker);
          visibleCount++;
        } else {
          markersLayer.removeLayer(marker);
        }
      });

      document.getElementById('museum-count').textContent = `${visibleCount} of ${museums.length} museums`;
      renderMuseumList(query);
    }

    // --- Museum list ---
    function renderMuseumList(query) {
      const listDiv = document.getElementById('museum-list');
      listDiv.innerHTML = '';

      const filtered = museums.filter(m => {
        const regionMatch = activeRegions.has(m.region);
        const searchMatch = !query || m.name.toLowerCase().includes(query) || m.address.toLowerCase().includes(query);
        return regionMatch && searchMatch;
      });

      filtered.forEach(m => {
        const item = document.createElement('div');
        item.className = 'museum-item';
        const color = getColor(m.region);
        item.innerHTML = `
          <div class="museum-name">${m.name}</div>
          <div class="museum-address">${m.address}</div>
          <span class="museum-region-dot" style="background:${color}"></span>
          <span class="museum-region">${m.region}</span>
        `;
        item.addEventListener('click', () => {
          map.setView([m.lat, m.lng], 13);
          // Open the corresponding marker popup
          allMarkers.forEach(marker => {
            if (marker.museumData === m) {
              marker.openPopup();
            }
          });
          // On mobile, close sidebar
          if (window.innerWidth < 768) {
            sidebar.classList.add('collapsed');
          }
        });
        listDiv.appendChild(item);
      });
    }

    // Initial render
    applyFilters();

    // --- Toggle sidebar ---
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-btn');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Start collapsed on mobile
    if (window.innerWidth < 768) {
      sidebar.classList.add('collapsed');
    }
  </script>
</body>
