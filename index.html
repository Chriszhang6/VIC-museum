<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Australia Museums Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100vh;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px 16px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    #sidebar.collapsed {
      transform: translateX(-300px);
    }

    #sidebar h1 {
      font-size: 20px;
      margin-bottom: 4px;
      color: #2c3e50;
    }

    #sidebar .subtitle {
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 16px;
    }

    /* Search */
    #search-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
    }

    #search-input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
    }

    /* Region filters */
    .filter-section {
      margin-bottom: 16px;
    }

    .filter-section h3 {
      font-size: 13px;
      color: #95a5a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .region-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      margin: 0 4px 6px 0;
      border: 2px solid;
      border-radius: 20px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .region-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .region-btn.active {
      color: white !important;
    }

    .region-btn .count {
      font-size: 10px;
      opacity: 0.7;
    }

    /* Museum list */
    .museum-list-section h3 {
      font-size: 13px;
      color: #95a5a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    #museum-count {
      font-size: 12px;
      color: #95a5a6;
      margin-bottom: 8px;
    }

    .museum-item {
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
    }

    .museum-item:hover {
      background: #f8f9fa;
    }

    .museum-item .museum-name {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 2px;
    }

    .museum-item .museum-address {
      font-size: 12px;
      color: #95a5a6;
    }

    .museum-item .museum-region-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .museum-item .museum-region {
      font-size: 11px;
      color: #95a5a6;
    }

    /* Toggle button */
    #toggle-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 1001;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    #sidebar:not(.collapsed) ~ #toggle-btn {
      left: 310px;
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      min-width: 240px;
    }

    .popup-card {
      padding: 16px;
    }

    .popup-card .popup-region {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-bottom: 8px;
    }

    .popup-card h2 {
      font-size: 16px;
      color: #2c3e50;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup-card .popup-address {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }

    .popup-card .popup-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .popup-card .popup-link {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 6px;
      background: #3498db;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .popup-card .popup-link:hover {
      background: #2980b9;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        width: 260px;
      }

      #sidebar:not(.collapsed) ~ #toggle-btn {
        left: 270px;
      }
    }
  </style>
</head>

    ];

    const regions = [
      {name:"VIC",color:"#16a085",fullName:"Victoria"},
      {name:"NSW",color:"#2980b9",fullName:"New South Wales"},
      {name:"QLD",color:"#e74c3c",fullName:"Queensland"},
      {name:"SA",color:"#e67e22",fullName:"South Australia"},
      {name:"WA",color:"#8e44ad",fullName:"Western Australia"},
      {name:"TAS",color:"#27ae60",fullName:"Tasmania"},
      {name:"NT",color:"#d35400",fullName:"Northern Territory"},
      {name:"ACT",color:"#2c3e50",fullName:"Australian Capital Territory"}
    ];
  </script>
  <script>
    // --- Map setup ---
    const map = L.map('map', {
      center: [-28.0, 134.0],
      zoom: 5,
      zoomControl: false
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    // --- Region color & fullName lookup ---
    const regionColorMap = {};
    const regionFullNameMap = {};
    regions.forEach(r => {
      regionColorMap[r.name] = r.color;
      regionFullNameMap[r.name] = r.fullName || r.name;
    });

    function getColor(region) {
      return regionColorMap[region] || '#999';
    }

    // --- Markers ---
    const markersLayer = L.layerGroup().addTo(map);
    let allMarkers = [];

    function createCircleMarker(m) {
      const color = getColor(m.region);
      const marker = L.circleMarker([m.lat, m.lng], {
        radius: 7,
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85
      });

      marker.bindPopup(`
        <div class="popup-card">
          <span class="popup-region" style="background:${color}">${regionFullNameMap[m.region] || m.region}</span>
          <h2>${m.name}</h2>
          <div class="popup-address">${m.address}</div>
          <div class="popup-desc">${m.description}</div>
          <a class="popup-link" href="${m.link}" target="_blank" rel="noopener">Visit Website</a>
        </div>
      `, { maxWidth: 300 });

      marker.museumData = m;
      return marker;
    }

    museums.forEach(m => {
      const marker = createCircleMarker(m);
      markersLayer.addLayer(marker);
      allMarkers.push(marker);
    });

    // --- Region filter buttons ---
    const activeRegions = new Set(regions.map(r => r.name));
    const filtersDiv = document.getElementById('region-filters');

    // Count museums per region
    const regionCounts = {};
    museums.forEach(m => {
      regionCounts[m.region] = (regionCounts[m.region] || 0) + 1;
    });

    regions.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'region-btn active';
      btn.style.borderColor = r.color;
      btn.style.color = r.color;
      btn.style.backgroundColor = r.color;
      btn.innerHTML = `<span class="dot" style="background:white"></span>${r.fullName || r.name} <span class="count">(${regionCounts[r.name] || 0})</span>`;
      btn.dataset.region = r.name;

      btn.addEventListener('click', () => {
        if (activeRegions.has(r.name)) {
          activeRegions.delete(r.name);
          btn.classList.remove('active');
          btn.style.backgroundColor = 'white';
          btn.querySelector('.dot').style.background = r.color;
        } else {
          activeRegions.add(r.name);
          btn.classList.add('active');
          btn.style.backgroundColor = r.color;
          btn.querySelector('.dot').style.background = 'white';
        }
        applyFilters();
      });

      filtersDiv.appendChild(btn);
    });

    // --- Search ---
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => applyFilters());

    function applyFilters() {
      const query = searchInput.value.toLowerCase().trim();
      let visibleCount = 0;

      allMarkers.forEach(marker => {
        const m = marker.museumData;
        const regionMatch = activeRegions.has(m.region);
        const searchMatch = !query || m.name.toLowerCase().includes(query) || m.address.toLowerCase().includes(query);
        const visible = regionMatch && searchMatch;

        if (visible) {
          markersLayer.addLayer(marker);
          visibleCount++;
        } else {
          markersLayer.removeLayer(marker);
        }
      });

      document.getElementById('museum-count').textContent = `${visibleCount} of ${museums.length} museums`;
      renderMuseumList(query);
    }

    // --- Museum list ---
    function renderMuseumList(query) {
      const listDiv = document.getElementById('museum-list');
      listDiv.innerHTML = '';

      const filtered = museums.filter(m => {
        const regionMatch = activeRegions.has(m.region);
        const searchMatch = !query || m.name.toLowerCase().includes(query) || m.address.toLowerCase().includes(query);
        return regionMatch && searchMatch;
      });

      filtered.forEach(m => {
        const item = document.createElement('div');
        item.className = 'museum-item';
        const color = getColor(m.region);
        item.innerHTML = `
          <div class="museum-name">${m.name}</div>
          <div class="museum-address">${m.address}</div>
          <span class="museum-region-dot" style="background:${color}"></span>
          <span class="museum-region">${m.region}</span>
        `;
        item.addEventListener('click', () => {
          map.setView([m.lat, m.lng], 13);
          // Open the corresponding marker popup
          allMarkers.forEach(marker => {
            if (marker.museumData === m) {
              marker.openPopup();
            }
          });
          // On mobile, close sidebar
          if (window.innerWidth < 768) {
            sidebar.classList.add('collapsed');
          }
        });
        listDiv.appendChild(item);
      });
    }

    // Initial render
    applyFilters();

    // --- Toggle sidebar ---
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-btn');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Start collapsed on mobile
    if (window.innerWidth < 768) {
      sidebar.classList.add('collapsed');
    }
  </script>
